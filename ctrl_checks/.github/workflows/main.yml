name: Frontend CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-typecheck:
    name: Lint + Type-Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Type-check
        run: npx tsc --noEmit
        continue-on-error: true

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          # AWS Cognito (public config values, safe as CI defaults)
          VITE_AWS_REGION: ${{ secrets.VITE_AWS_REGION || 'ap-south-1' }}
          VITE_COGNITO_USER_POOL_ID: ${{ secrets.VITE_COGNITO_USER_POOL_ID || 'ap-south-1_placeholder' }}
          VITE_COGNITO_CLIENT_ID: ${{ secrets.VITE_COGNITO_CLIENT_ID || 'placeholder-client-id' }}
          VITE_COGNITO_DOMAIN: ${{ secrets.VITE_COGNITO_DOMAIN || 'placeholder.auth.ap-south-1.amazoncognito.com' }}
          # API
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://worker.ctrlchecks.ai' }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_URL || 'https://worker.ctrlchecks.ai' }}
          VITE_PUBLIC_BASE_URL: ${{ secrets.VITE_PUBLIC_BASE_URL || 'https://ctrlchecks.ai' }}
          # Feature flags
          VITE_USE_DIRECT_BACKEND: 'false'
          VITE_META_FACEBOOK_CONFIG_ID: ${{ secrets.VITE_META_FACEBOOK_CONFIG_ID || '' }}
          VITE_META_FACEBOOK_EXTRA_SCOPES: 'pages_show_list'
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 7
