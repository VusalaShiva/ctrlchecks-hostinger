worker_processes auto;

events {
    worker_connections 4096;
}

http {
    # HTTP API upstream — least_conn for optimal load balancing
    upstream ctrlchecks_app {
        least_conn;
        server app1:3001 max_fails=3 fail_timeout=10s;
        server app2:3001 max_fails=3 fail_timeout=10s;
        server app3:3001 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    # WebSocket upstream — ip_hash so each client always hits the same replica.
    # This keeps WebSocket connections alive without needing session re-establishment.
    # The ws-redis-bridge handles cross-replica event delivery when clients are on
    # different replicas; ip_hash is an additional stability layer.
    upstream ctrlchecks_ws {
        ip_hash;
        server app1:3001;
        server app2:3001;
        server app3:3001;
    }

    server {
        listen 80;
        server_name _;

        keepalive_timeout 65;
        client_max_body_size 50M;

        location = /health {
            access_log off;
            proxy_pass http://ctrlchecks_app/health;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # WebSocket endpoints — sticky routing via ip_hash upstream
        location /ws/ {
            proxy_pass http://ctrlchecks_ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location / {
            proxy_pass http://ctrlchecks_app;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_send_timeout 65s;
            proxy_read_timeout 65s;
        }
    }
}
