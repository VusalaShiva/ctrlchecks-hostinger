      - target_label: service
        replacement: notification-service

  # Trigger Service (port 3006)
  - job_name: ctrlchecks-trigger-service
    static_configs:
      - targets: ['127.0.0.1:3006']
    metrics_path: /metrics
    scrape_interval: 15s
    relabel_configs:
      - target_label: service
        replacement: trigger-service

  # Workflow CRUD Service (port 3007)
  - job_name: ctrlchecks-workflow-crud-service
    static_configs:
      - targets: ['127.0.0.1:3007']
    metrics_path: /metrics
    scrape_interval: 15s
    relabel_configs:
      - target_label: service
        replacement: workflow-crud-service
